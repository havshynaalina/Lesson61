<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    body {
        font-family: sans-serif;
        background-color: #e4e5e9;
        padding: 40px;
    }

    .island {
        width: 600px;
        height: 500px;
        background-color: #ffffff;
        shadow: 0px 20px 15px 10px rgba(0, 0, 0, 0.455);
        border-radius: 8px;

        display: flex;
        justify-content: center;
        align-items: center;
    }

    h1 {
        font-size: 25px;
    }
     
    .box {
        display: flex;
        gap: 14px;
    }

    .box input {
        display: none;
    }

    .box label {
        display: flex;
        align-items: center;

        width: 190px;
        height: 50px;
        padding-left: 18px;

        border: 2px solid #d8d8d8;
        border-radius: 8px;
        transition: .25s;
        
        cursor: pointer;
        font-size: 16px;

        color: #222;
        background: #fff;
    }

    .box label::before {
        content: "";
        width: 10px;
        height: 10px;

        border: 3px solid #a7a7a7;
        border-radius: 50%;
        margin-right: 16px;
        transition: .25s;
    }

    #light:checked+label {
        border-color: #2f6df6;
        background: #eef3ff;

    }

    #light:checked+label::before {
        border-color: #2f6df6;
        box-shadow: inset 0 0 0 5px #2f6df6;

    }

    #dark:checked+label {
        border-color: #d8d8d8;
        background: #fff;
    }

    #dark:checked+label::before {
        border-color: #2f6df6;
        box-shadow: inset 0 0 0 5px #2f6df6;
    }

    label {
        font-size: 18px;
    }

    .tema {
        color: gray;
        font-size: 16px;
        margin-top: 32px;
    }

    .settings {
       max-width: 450px;
    }
    
    .title {
       font-size: 20px;
       color: #5f6368;
       text-transform: uppercase;
       margin-bottom: 20px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid #f1f3f4;
    }

    .text {
       font-size: 15px;
       color: #333333;
    }

   .switch {
       position: relative;
       display: inline-block;

       width: 40px;
       height: 20px;
    }

    .switch input {
       display: none;
    }

    .slider {
       position: absolute;
       top: 0;
       left: 0;
       right: 0;
       bottom: 0;

       background-color: #cccccc;
       border-radius: 10px;

       cursor: pointer;
       transition: background-color 0.3s ease;
    }

    .slider::after {
       content: "";
       position: absolute;

       width: 14px;
       height: 14px;

       background-color: #ffffff;
       border-radius: 50%;
       top: 3px;
       left: 3px;
  
       transition: transform 0.3s ease;
    }

    .switch input:checked + .slider {
        background-color: #1a73e8;
    }


    .switch input:checked + .slider::after {
       transform: translateX(20px);
    }

    .button {
        width: 450px;
        height: 40px;
        margin-top: 30px;

        background-color: #1a73e8;
        color: #ffffff;
        font-weight: 600;
        border: none;
        border-radius: 8px;

    }

    </style>

</head>

<body>
<main>
    <div class="island">
        <div>
            <h1>Налаштування акаунту</h1>
            <h2 class="tema">ТЕМА ІНТЕРФЕЙСУ</h2>

            <div class="box">
            <input type="radio" id="light" name="theme" checked>
            <label for="light">Світла</label>

            <input type="radio" id="dark" name="theme">
            <label for="dark">Темна</label>
        </div>

        <div class="settings">
            <h2 class="tema">EMAIL СПОВІЩЕННЯ</h2>
    
        <div class="row">
            <span class="text">Нові повідомлення в чаті</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>
    
        <div class="row">
            <span class="text">Щотижневий звіт успішності</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>
        </div>

        <div>
            <button class="button">Зберігти налаштування</button>
        </div>
    </div>
</main>
</body>

</html>
